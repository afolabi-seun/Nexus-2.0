# =============================================================================
# Nexus 2.0 — CI Pipeline
# Triggers on push to dev and pull requests to main
# Builds and tests all 5 backend services + frontend
# On success (dev branch), auto-merges to main
# =============================================================================

name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "18"

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Build & Test (parallel per service)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - SecurityService
          - ProfileService
          - WorkService
          - UtilityService
          - BillingService

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/backend/${{ matrix.service }}/${{ matrix.service }}.Api/${{ matrix.service }}.Api.csproj && dotnet restore src/backend/${{ matrix.service }}/${{ matrix.service }}.Tests/${{ matrix.service }}.Tests.csproj

      - name: Build
        run: dotnet build src/backend/${{ matrix.service }}/${{ matrix.service }}.Api/${{ matrix.service }}.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test src/backend/${{ matrix.service }}/${{ matrix.service }}.Tests/${{ matrix.service }}.Tests.csproj -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: src/backend/${{ matrix.service }}/${{ matrix.service }}.Tests/TestResults/

  # ---------------------------------------------------------------------------
  # Frontend — Build & Test
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint
        working-directory: src/frontend
        run: npm run lint || true

      - name: Build
        working-directory: src/frontend
        env:
          VITE_SECURITY_API_URL: http://localhost:5001
          VITE_PROFILE_API_URL: http://localhost:5002
          VITE_WORK_API_URL: http://localhost:5003
          VITE_UTILITY_API_URL: http://localhost:5200
          VITE_BILLING_API_URL: http://localhost:5300
          VITE_APP_NAME: "Nexus 2.0"
        run: npm run build

      - name: Test
        working-directory: src/frontend
        run: npx vitest --run

  # ---------------------------------------------------------------------------
  # Solution — Full build check
  # ---------------------------------------------------------------------------
  solution-build:
    name: Solution Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build entire solution
        run: dotnet build Nexus-2.0.sln -c Release

  # ---------------------------------------------------------------------------
  # Auto-merge dev → main via PR (only on push to dev, after all checks pass)
  # ---------------------------------------------------------------------------
  auto-merge:
    name: Create PR to main
    runs-on: ubuntu-latest
    needs: [backend, frontend, solution-build]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR from dev to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists
          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists — it will auto-update with the new commits."
          else
            gh pr create \
              --base main \
              --head dev \
              --title "Auto-merge: dev → main (CI passed)" \
              --body "Automated PR created by CI after all build and test checks passed on dev branch."
            
            # Get the new PR number
            EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')
          fi
          
          # Enable auto-merge (merges when status checks pass)
          gh pr merge "$EXISTING_PR" --auto --merge
