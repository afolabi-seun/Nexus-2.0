# =============================================================================
# Nexus 2.0 — Local Development (PostgreSQL + Redis installed locally)
# Only runs: 5 backend services + frontend + Seq
# Usage: docker compose -f docker/docker-compose.local.yml up --build
# =============================================================================

services:
  seq:
    image: datalust/seq:latest
    container_name: nexus-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

  security-service:
    build:
      context: ../src/backend/SecurityService
      dockerfile: SecurityService.Api/Dockerfile
    container_name: nexus-security
    ports:
      - "5001:5001"
    environment:
      DATABASE_CONNECTION_STRING: "Host=host.docker.internal;Port=5432;Database=nexus_security;Username=postgres;Password=pass.123"
      REDIS_CONNECTION_STRING: "host.docker.internal:6379"
      JWT_SECRET_KEY: "docker-dev-secret-key-must-be-at-least-32-characters!!"
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      ACCESS_TOKEN_EXPIRY_MINUTES: "15"
      REFRESH_TOKEN_EXPIRY_DAYS: "7"
      LOGIN_RATE_LIMIT_MAX: "50"
      LOGIN_RATE_LIMIT_WINDOW_MINUTES: "15"
      OTP_RATE_LIMIT_MAX: "20"
      OTP_RATE_LIMIT_WINDOW_MINUTES: "5"
      ACCOUNT_LOCKOUT_MAX_ATTEMPTS: "20"
      ACCOUNT_LOCKOUT_WINDOW_HOURS: "24"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "5"
      OTP_EXPIRY_MINUTES: "10"
      OTP_MAX_ATTEMPTS: "10"
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173,http://security-service:5001,http://profile-service:5002,http://work-service:5003,http://utility-service:5200,http://billing-service:5300"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: SecurityService
      SERVICE_NAME: SecurityService
      SERVICE_SECRET: docker-dev-service-secret
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  profile-service:
    build:
      context: ../src/backend/ProfileService
      dockerfile: ProfileService.Api/Dockerfile
    container_name: nexus-profile
    ports:
      - "5002:5002"
    environment:
      DATABASE_CONNECTION_STRING: "Host=host.docker.internal;Port=5432;Database=nexus_profile;Username=postgres;Password=pass.123"
      REDIS_CONNECTION_STRING: "host.docker.internal:6379"
      JWT_SECRET_KEY: "docker-dev-secret-key-must-be-at-least-32-characters!!"
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173,http://security-service:5001,http://profile-service:5002,http://work-service:5003,http://utility-service:5200,http://billing-service:5300"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: ProfileService
      SERVICE_NAME: ProfileService
      SERVICE_SECRET: docker-dev-service-secret
      INVITE_EXPIRY_HOURS: "48"
      INVITE_TOKEN_LENGTH: "128"
      MAX_DEVICES_PER_USER: "5"
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  work-service:
    build:
      context: ../src/backend/WorkService
      dockerfile: WorkService.Api/Dockerfile
    container_name: nexus-work
    ports:
      - "5003:5003"
    environment:
      DATABASE_CONNECTION_STRING: "Host=host.docker.internal;Port=5432;Database=nexus_work;Username=postgres;Password=pass.123"
      REDIS_CONNECTION_STRING: "host.docker.internal:6379"
      JWT_SECRET_KEY: "docker-dev-secret-key-must-be-at-least-32-characters!!"
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173,http://security-service:5001,http://profile-service:5002,http://work-service:5003,http://utility-service:5200,http://billing-service:5300"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: WorkService
      SERVICE_NAME: WorkService
      SERVICE_SECRET: docker-dev-service-secret
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  utility-service:
    build:
      context: ../src/backend/UtilityService
      dockerfile: UtilityService.Api/Dockerfile
    container_name: nexus-utility
    ports:
      - "5200:5200"
    environment:
      DATABASE_URL: "Host=host.docker.internal;Port=5432;Database=nexus_utility;Username=postgres;Password=pass.123"
      REDIS_URL: "host.docker.internal:6379"
      JWT_SECRET: "docker-dev-secret-key-must-be-at-least-32-characters!!"
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173,http://security-service:5001,http://profile-service:5002,http://work-service:5003,http://utility-service:5200,http://billing-service:5300"
      SEQ_URL: "http://seq:80"
      OUTBOX_POLL_INTERVAL_SECONDS: "30"
      RETENTION_PERIOD_DAYS: "90"
      RETENTION_SCHEDULE_HOUR: "2"
      NOTIFICATION_RETRY_MAX: "3"
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  billing-service:
    build:
      context: ../src/backend/BillingService
      dockerfile: BillingService.Api/Dockerfile
    container_name: nexus-billing
    ports:
      - "5300:5300"
    environment:
      DATABASE_CONNECTION_STRING: "Host=host.docker.internal;Port=5432;Database=nexus_billing;Username=postgres;Password=pass.123"
      REDIS_CONNECTION_STRING: "host.docker.internal:6379"
      JWT_SECRET_KEY: "docker-dev-secret-key-must-be-at-least-32-characters!!"
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173,http://security-service:5001,http://profile-service:5002,http://work-service:5003,http://utility-service:5200,http://billing-service:5300"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: BillingService
      SERVICE_NAME: BillingService
      SERVICE_SECRET: docker-dev-service-secret
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    ports:
      - "5173:80"
    depends_on:
      - security-service
      - profile-service
      - work-service
      - utility-service
      - billing-service

volumes:
  seq_data: