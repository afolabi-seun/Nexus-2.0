# =============================================================================
# Nexus 2.0 — Docker Compose (Local Development)
# Usage: docker compose -f docker/docker-compose.yml up --build
# =============================================================================

name: nexus

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass.123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: nexus-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "Admin@123"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data

  # ---------------------------------------------------------------------------
  # Backend Services
  # ---------------------------------------------------------------------------
  security-service:
    build:
      context: ../src/backend/SecurityService
      dockerfile: SecurityService.Api/Dockerfile
    image: nexus-security-service
    container_name: nexus-security
    ports:
      - "5001:5001"
    environment:
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=nexusDb;SearchPath=nexus_security;Username=postgres;Password=pass.123"
      DATABASE_SCHEMA: nexus_security
      REDIS_CONNECTION_STRING: "redis:6379"
      JWT_SECRET_KEY: "o9AVZw+bZdOPnN9svJl1euvJ3IuMb5Sl2vRTrDtUXnI="
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      ACCESS_TOKEN_EXPIRY_MINUTES: "15"
      REFRESH_TOKEN_EXPIRY_DAYS: "7"
      LOGIN_RATE_LIMIT_MAX: "50"
      LOGIN_RATE_LIMIT_WINDOW_MINUTES: "15"
      OTP_RATE_LIMIT_MAX: "20"
      OTP_RATE_LIMIT_WINDOW_MINUTES: "5"
      ACCOUNT_LOCKOUT_MAX_ATTEMPTS: "20"
      ACCOUNT_LOCKOUT_WINDOW_HOURS: "24"
      ACCOUNT_LOCKOUT_DURATION_MINUTES: "5"
      OTP_EXPIRY_MINUTES: "10"
      OTP_MAX_ATTEMPTS: "10"
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: SecurityService
      SERVICE_NAME: SecurityService
      SERVICE_SECRET: docker-dev-service-secret
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  profile-service:
    build:
      context: ../src/backend/ProfileService
      dockerfile: ProfileService.Api/Dockerfile
    image: nexus-profile-service
    container_name: nexus-profile
    ports:
      - "5002:5002"
    environment:
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=nexusDb;SearchPath=nexus_profile;Username=postgres;Password=pass.123"
      DATABASE_SCHEMA: nexus_profile
      REDIS_CONNECTION_STRING: "redis:6379"
      JWT_SECRET_KEY: "o9AVZw+bZdOPnN9svJl1euvJ3IuMb5Sl2vRTrDtUXnI="
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: ProfileService
      SERVICE_NAME: ProfileService
      SERVICE_SECRET: docker-dev-service-secret
      INVITE_EXPIRY_HOURS: "48"
      INVITE_TOKEN_LENGTH: "128"
      MAX_DEVICES_PER_USER: "5"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  work-service:
    build:
      context: ../src/backend/WorkService
      dockerfile: WorkService.Api/Dockerfile
    image: nexus-work-service
    container_name: nexus-work
    ports:
      - "5003:5003"
    environment:
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=nexusDb;SearchPath=nexus_work;Username=postgres;Password=pass.123"
      DATABASE_SCHEMA: nexus_work
      REDIS_CONNECTION_STRING: "redis:6379"
      JWT_SECRET_KEY: "o9AVZw+bZdOPnN9svJl1euvJ3IuMb5Sl2vRTrDtUXnI="
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      UTILITY_SERVICE_BASE_URL: "http://utility-service:5200"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: WorkService
      SERVICE_NAME: WorkService
      SERVICE_SECRET: docker-dev-service-secret
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  utility-service:
    build:
      context: ../src/backend/UtilityService
      dockerfile: UtilityService.Api/Dockerfile
    image: nexus-utility-service
    container_name: nexus-utility
    ports:
      - "5200:5200"
    environment:
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=nexusDb;SearchPath=nexus_utility;Username=postgres;Password=pass.123"
      DATABASE_SCHEMA: nexus_utility
      REDIS_CONNECTION_STRING: "redis:6379"
      JWT_SECRET_KEY: "o9AVZw+bZdOPnN9svJl1euvJ3IuMb5Sl2vRTrDtUXnI="
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173"
      SEQ_URL: "http://seq:80"
      OUTBOX_POLL_INTERVAL_SECONDS: "30"
      RETENTION_PERIOD_DAYS: "90"
      RETENTION_SCHEDULE_HOUR: "2"
      NOTIFICATION_RETRY_MAX: "3"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  billing-service:
    build:
      context: ../src/backend/BillingService
      dockerfile: BillingService.Api/Dockerfile
    image: nexus-billing-service
    container_name: nexus-billing
    ports:
      - "5300:5300"
    environment:
      DATABASE_CONNECTION_STRING: "Host=postgres;Port=5432;Database=nexusDb;SearchPath=nexus_billing;Username=postgres;Password=pass.123"
      DATABASE_SCHEMA: nexus_billing
      REDIS_CONNECTION_STRING: "redis:6379"
      JWT_SECRET_KEY: "o9AVZw+bZdOPnN9svJl1euvJ3IuMb5Sl2vRTrDtUXnI="
      JWT_ISSUER: SecurityService
      JWT_AUDIENCE: NexusPlatform
      SECURITY_SERVICE_BASE_URL: "http://security-service:5001"
      PROFILE_SERVICE_BASE_URL: "http://profile-service:5002"
      FRONTEND_URL: "http://localhost:5173"
      ALLOWED_ORIGINS: "http://localhost:5173"
      SEQ_URL: "http://seq:80"
      SERVICE_ID: BillingService
      SERVICE_NAME: BillingService
      SERVICE_SECRET: docker-dev-service-secret
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
    image: nexus-frontend
    container_name: nexus-frontend
    ports:
      - "5173:80"
    depends_on:
      - security-service
      - profile-service
      - work-service
      - utility-service
      - billing-service

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  seq_data: